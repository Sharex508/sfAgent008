<template>
    <template if:true={showSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
      </template>
      <div class="slds-box slds-box_small">
    

        <lightning-input name="Street" type="text" class="validate" label="Street" value={signupInformation.accountShippingStreetAddress}
                     placeholder="Street"  maxlength="255" onchange={handleStreetChange} required></lightning-input>
            <div class="demo-only demo-only--sizing slds-grid slds-wrap">
                <div class="slds-size_1-of-2">
                    <lightning-input name="City" type="text" class="validate" label="City" value={signupInformation.accountShippingCity}
                          placeholder="City"  maxlength="255" onchange={handleCityChange} required></lightning-input>
                </div>
                
                <div class="slds-size_1-of-2 slds-p-left_large">
                    
                    <lightning-input name="ZipCode" class="validate" label="Zip Code" value={signupInformation.accountShippingZipCode}
                     placeholder="Zip code"  maxlength="50" required onchange={handleZipChange} 
                         ></lightning-input> 
                </div>
                </div> 
                    <lightning-combobox
                            name="Country"
                            label="Country"
                            class="validate"
                            value={signupInformation.accountShippingCountry}
                            placeholder="Select Country"
                            options={contList}
                            onchange={handleCountryChange}
                            required
                    ></lightning-combobox> 

                    <lightning-combobox
                        name="State"
                        label="State"
                        class="validate"
                        value={signupInformation.accountShippingState}
                        placeholder="Select State"
                        options={shippingStateListOptions}
                        onchange={handleStateChange}
                        required
                    ></lightning-combobox>

                     

        <div class="slds-p-bottom_small"></div>
    </div> 
        <lightning-input type="checkbox" label={labels.sameAsBillingAddLabel} name="input1" onchange={handleSameBillingAddress}></lightning-input>
</template>
