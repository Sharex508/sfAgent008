<template>
    <template if:true={isloading}>
        <lightning-spinner alternative-text="Loading" size="medium" class="spinnerClass"></lightning-spinner>
    </template>
    <!-- <div class="slds-grid slds-gutters">
        <div class="slds-col slds-size_1-of-1"> -->
    <!-- <h3 class="slds-theme_shade"> -->
        <!-- <div class="slds-tabs_card"> -->
    <button 
        onclick={openModal}
        class="slds-button slds-button_outline-brand slds-button_stretch">
          New Cart
    </button>
    <br/>
    <button 
        onclick={navigateToCarts}
        class="slds-button slds-button_outline-brand slds-button_stretch">
            Manage Shopping Carts
    </button>
        <!-- </div> -->
    <!-- </h3> -->
    <!-- <button class="slds-button slds-button_neutral slds-button_stretch">Stretched Neutral Button</button> -->
    <!-- <button 
    variant="brand-outline"
    label="MANAGE SHOPPING CARTS"
    title="Click to navigate to your Cart page"
    onclick={navigateToCarts}
    class="slds-button_stretch">
</button> -->
        <!-- </div>
    </div> -->
    <template if:true={isModalOpen}>
        <!-- Modal/Popup Box LWC starts here -->
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Modal/Popup Box LWC header here -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="close"
                            variant="inverse"
                            size="small" ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">New Cart Creation</h2>
                </header>
                <!-- Modal/Popup Box LWC body starts here -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                <!-- </b></p>
                <p><b>Enter a name for the New Cart.
                </b></p> -->
                    <lightning-input type="text" field-name="CartName" onchange={handleNameChange} value={cartNameValue} label="Enter New Cart Name">
                    </lightning-input>
                </div>
                <!-- Modal/Popup Box LWC footer starts here -->
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeModal} title="Cancel">Cancel</button>
                    <lightning-button label="Create New Cart" title="Create New Cart" onclick={newCart} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
