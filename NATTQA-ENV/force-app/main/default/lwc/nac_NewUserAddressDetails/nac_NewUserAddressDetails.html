<template>
    <template if:true={showSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
      </template>
    <div class="slds-box">
        <div class="slds-p-bottom_large"></div>
        <div class="slds-modal__content slds-p-around_medium">
            <div class="slds-text-heading_medium slds-p-bottom_small slds-border_bottom">Address Details</div>
            <lightning-radio-group label="Select Address" options={billingAddressOptions}
                variant="label-hidden" value={shippingAddressIndex} type="radio"
                class="slds-p-bottom_small slds-p-around_large" onchange={handleSelectedAddressChange}>
            </lightning-radio-group>
        </div>
        
    </div>
    
</template>
