<template>
  <div class="sf-lead-form">
    <!-- TOP-ONLY BG -->
    <div class="hero" style={heroStyle}>
      <div class="branding-container">
        <img src={carrierLogoUrl} alt="Carrier Logo" class="carrier-logo" />
        <h2 class="banner-title">Digital Solutions Contact Form</h2>
        
      </div>
    </div>
           <div class="form-text text-muted" style="margin-bottom:20px;">Fields marked with an asterisk (*) are mandatory.</div>
 
    <!-- Native form POST -->
    <form action={actionUrl} method="POST" target="_top" onsubmit={handleSubmit}>
      <input type="hidden" name="oid" value={orgId} />
      <input type="hidden" name="retURL" value={retURL} />
      <input type="hidden" name={LanguageFieldId} value={LanguageValue} />
      <input type="hidden" name="recordType" value={ContainerLeadRecTypeId} />
      <input type="hidden" name="lead_source" value={LeadSource}/>

      <!-- First / Last Name -->
      <div class="form-group">
        <label for="first_name">First Name <span style="color:red">*</span></label>
        <input id="first_name" name="first_name" maxlength="40" type="text" class="form-control" required />
      </div>

      <div class="form-group">
        <label for="last_name">Last Name <span style="color:red">*</span></label>
        <input id="last_name" name="last_name" maxlength="80" type="text" class="form-control" required />
      </div>

      <!-- Job Title -->
      <div class="form-group">
        <label for="title">Job Title</label>
        <input id="title" name="title" maxlength="40" type="text" class="form-control" />
      </div>

      <!-- Email / Mobile -->
      <div class="form-group">
        <label for="email">Email <span style="color:red">*</span></label>
        <input id="email" name="email" maxlength="80" type="email" class="form-control" required />
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Phone <span style="color:red">*</span></label>
        <input id="mobile" name="mobile" maxlength="40" type="tel" class="form-control" onchange={handleMobileChange} oninput={clearMobileError} required />
        <small class="form-text text-muted">Please include your country code, e.g., +1 for USA, +34 for Spain.</small>
      </div>

      <!-- Visit Purpose -->
      <div class={vpGroupClass}>
        <label>Visit Purpose:<span style="color:red">*</span></label>

        <div><input type="checkbox" aria-describedby="vpErrorText" name={VisitPurpousFieldId} value="Digital Product Information" onchange={handleVisitPurposeChange}> Digital Product Information</div>
        <div><input type="checkbox" aria-describedby="vpErrorText" name={VisitPurpousFieldId} value="Purchase" onchange={handleVisitPurposeChange}> Purchase</div>
        <div><input type="checkbox" aria-describedby="vpErrorText" name={VisitPurpousFieldId} value="Prospection" onchange={handleVisitPurposeChange}> Prospection</div>

        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="vpErrorText" id={VisitPurpousFieldId} name={VisitPurpousFieldId} value="Other" class="cb"  onchange={handleVisitPurposeChange}>
          <span> Other</span>
        </div>

        <template if:true={showOtherVisitPurpose}>
          <div class="form-group" style="margin-left:28px;">
            <input id={OtherVisitPurpousFieldId} name={OtherVisitPurpousFieldId} maxlength="255" size="20" type="text" class="form-control" oninput={clearOtherVisitError} required/>
          </div>
        </template>

        <small class="form-text text-muted">Choose multiple values</small>
        <div class="error-text" id="vpErrorText" role="alert" aria-live="polite">{vpError}</div>
      </div>

      <!-- Products Interested -->
      <div class={piGroupClass}>
        <label>Products Interested:<span style="color:red">*</span></label>

        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="LYNX Fleet (Reefer Telematics)" class="cb" onchange={handleProductsChange}>
          <span>LYNX Fleet (Reefer Telematics)</span>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="LYNX API" class="cb" onchange={handleProductsChange}>
          <span>LYNX API</span>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="Vessel Control Tower (VCT)" class="cb" onchange={handleProductsChange}>
          <span>Vessel Control Tower (VCT)</span>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="IoTPASS (Dry Box Telematics)" class="cb" onchange={handleProductsChange}>
          <span>IoTPASS (Dry Box Telematics)</span>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="BluEdge Partner channel program" class="cb" onchange={handleProductsChange}>
          <span>BluEdge Partner channel program</span>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" aria-describedby="piErrorText" name={ProductsIntFieldId} value="Other" class="cb" onchange={handleProductsChange}>

        </div>

        <template if:true={showOtherProducts}>

          </div>
        </template>

        <small class="form-text text-muted">Choose multiple values</small>
        <div class="error-text" id="piErrorText" role="alert" aria-live="polite">{piError}</div>
      </div>

      </div>

      </div>
