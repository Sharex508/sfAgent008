<template>
    <template if:true={isloading}>
        <lightning-spinner alternative-text="Loading" size="medium" class="spinnerClass"></lightning-spinner>
      </template>
    <div class="section slds-section slds-is-open">
        <h3 class="section slds-section__title slds-theme_shade">
          <span class="slds-text-heading_medium slds-p-bottom_medium" title="Section Title">{label.CartsTitleLabel}</span>
        </h3>
      </div>

      <lightning-datatable 
            data={cartList} 
            columns={columns} 
            key-field="Id"
            onrowaction={callRowAction} 
            hide-checkbox-column="true">
        </lightning-datatable>
        
        <div class="slds-m-top_large">            
            <lightning-button 
                variant="brand"
                label={label.CreateNewCartLabel}
                title="New Cart?"
                onclick={openModal}
                class="slds-m-left_x-small">
            </lightning-button>
        </div>

        <!-- New Cart Modal -->
        <template if:true={isModalOpen}>
            <!-- Modal/Popup Box start -->
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!--  New Cart Modal/Popup Box header -->
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close"
                                alternative-text="close"
                                variant="inverse"
                                size="small" ></lightning-icon>
                            <span class="slds-assistive-text">{label.CloseLabel}</span>
                        </button>
                        <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{label.SaveLabel}</h2>
                    </header>

                    <!-- New Cart Modal/Popup Box body -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                        <lightning-card title={label.SaveCurrentCartLabel}>
                            <p class="slds-p-horizontal_small">{label.EnterANameLabel}</p>
                        </lightning-card>
                        <lightning-input type="text" field-name="CartName" onchange={handleNameChange} value={cartNameValue} label={label.CartNameLabel}>
                        </lightning-input>
                    </div>
                    <!-- New Cart Modal/Popup Box footer -->
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeModal} title="Cancel">{label.CancelLabel}</button>
                        <lightning-button variant="brand" label={label.SaveAndCreateNewCartLabel} title={label.SaveAndCreateNewCartLabel} onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Rename Cart Modal -->
        <template if:true={isRenameModalOpen}>
            <!-- Rename Cart Modal/Popup Box start -->
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <!-- Rename Cart Modal/Popup Box header -->
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeRenameModal}>
                            <lightning-icon icon-name="utility:close"
                                alternative-text="close"
                                variant="inverse"
                                size="small" ></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">{label.RenameCartLabel}</h2>
                    </header>

                    <!-- Rename Cart Modal/Popup Box body -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
                        <lightning-input type="text" field-name="CartName" onchange={handleCartRename} value={cartRenameValue} label={label.EnterANewNameLabel}>
                        </lightning-input>
                    </div>
                    <!-- Rename Cart Modal/Popup Box footer -->
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeRenameModal} title="Cancel">{label.CancelLabel}</button>
                        <lightning-button variant="brand" label={label.RenameCartLabel} title="Rename Cart" onclick={handleRename} class="slds-m-left_x-small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    
        <template if:true={error}>
            {error}
        </template>

        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;

</template>
