<template>
    <template if:true={showSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    
    <div class="slds-p-left_x-large slds-p-right_large">
        <div class="slds-text-heading_large ">{label.DownloadPBLabel}</div>
        <div class="slds-m-vertical_medium slds-text-heading_medium"> {label.SelectFileLabel}</div>
        <article class="slds-card" style="background-color:aliceblue">
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__body ">

                        <center>
                            <p class="slds-text-body_small">{label.descriptionTextLabel}</p>
                        </center>

                        <div class="slds-grid slds-gutters slds-p-around_x-large">
                            <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                <lightning-button variant="brand" class="downloadColor" label="Download Excel" title="Download Excel"
                                    onclick={exportProductData}></lightning-button>

                            </div>
                            <div class="slds-col slds-size_1-of-4 slds-text-align_center">
                                <lightning-button variant="brand" class="downloadColor" label={label.DownloadPDFLabel} onclick={redirectVf}>
                                </lightning-button>
                            </div>

                            <div class="slds-col slds-size_1-of-4 slds-text-align_left">
                                <lightning-button variant="brand" class="downloadColor" label="Download Price Change file" title="Download Price Change file"
                                    onclick={exportProducPriceChangeData}></lightning-button>

                            </div>

                            <!-- CXREF 3819 : Changes Starts -->
                            <div>
                                <a href={downloadLink} class="slds-button slds-button_brand slds-col slds-text-align_left"
                                target="popup"
                                onclick={openPopupModal}>Download Price Book Guide</a>
                            </div>
                            <!-- CXREF 3819 : Changes Ends -->
                        </div>
                    </div>
                </header>
            </div>
        </article>
    </div>
</template>
