<template>
    <lightning-card title="Account NPS Score" icon-name="custom:custom83">
        <lightning-button-icon icon-name="action:refresh" variant="border-filled" alternative-text="Refresh"
            slot="actions" onclick={handleRefresh}>
        </lightning-button-icon>
        <lightning-layout multiple-rows>
            <lightning-layout-item size="4" padding="around-small">
                <div class="slds-var-p-top_x-small">Select Time Range</div>
            </lightning-layout-item>
            <lightning-layout-item size="8" padding="around-small">
                <lightning-combobox name="RangePicker" label="Choose Time Range" options={timeRangeOptions}
                    onchange={handleRangeChange} value={selectedRange} variant="label-hidden">
                </lightning-combobox>
            </lightning-layout-item>
        </lightning-layout>
        <template lwc:if={booLoading}>
            <lightning-spinner alternative-text="Loading" variant="brand"></lightning-spinner>
        </template>
        <template lwc:else>
            <template lwc:if={hideScore}>
                <div class="slds-align_absolute-center" style="height:5rem">No responses present for this account.</div>
            </template>
            <template lwc:else>
                <!-- Gauge Chart Section -->
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_12-of-12">
                        <div class="slds-align_absolute-center slds-text-title_bold">0</div>
                    </div>
                    <div class="slds-col slds-size_12-of-12">
                        <div class="slds-align_absolute-center" style="height:10rem;">
                            <div class="gauge">
                                <div class="gauge__body">
                                    <div class="gauge__fill"></div>
                                    <div class="gauge__cover"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_3-of-12"></div>
                    <div class="slds-col slds-size_4-of-12 slds-m-right_x-large">
                        <div class="slds-text-title_bold">-100</div>
                    </div>
                    <div class="slds-col slds-size_3-of-12 slds-m-left_x-large">
                        <div class="slds-text-title_bold">100</div>
                    </div>
                    <br /><br />
                    <div class="slds-col slds-size_3-of-12"></div>
                    <div class="slds-col slds-size_7-of-12">
                        <span class="slds-m-left_large slds-text-title_bold">Total Number Of Responses : {responseData.intTotalResponsesCount}</span>
                    </div>
                    <div class="slds-col slds-size_3-of-12"></div>
                </div>
            </template>
        </template>
    </lightning-card>
</template>
