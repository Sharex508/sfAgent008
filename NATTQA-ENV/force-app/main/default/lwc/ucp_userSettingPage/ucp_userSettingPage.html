<template>
    <lightning-card title="User Information" icon-name="standard:user"
        style="padding:5px">

        <div class="slds-form" role="list" style="padding:5px">
            <div class="slds-form__row">
                <div class="slds-form__item" role="listitem">
                    <div class="slds-form-element slds-form-element_readonly slds-form-element_stacked slds-hint-parent">
                        <span class="slds-form-element__label"><strong>Full Name:</strong></span>
                        <div class="slds-form-element__control">
                            <div class="slds-form-element__static">
                                {fullName}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

           <div class="slds-form__row">
                <div class="slds-form__item" role="listitem">
                    <div class="slds-form-element slds-form-element_readonly slds-form-element_stacked slds-hint-parent">
                        <span class="slds-form-element__label"><strong>Email:</strong></span>
                        <div class="slds-form-element__control">
                            <div class="slds-form-element__static">
                              {email}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </lightning-card>
    
    
</template>
