<template>
    <lightning-card title="Clone Deal & Quote" icon-name="standard:quote">
        <div class="slds-m-around_medium slds-align_absolute-center slds-grid slds-grid_vertical-align-center slds-grid_align-center">

            <!-- If Approved -->
            <template if:true={isApproved}>
                <lightning-button
                    label="Confirm Clone"
                    variant="brand"
                    onclick={handleClone}
                    disabled={isLoading}>
                </lightning-button>
            </template>

            <!-- If Not Approved -->
            <template if:false={isApproved}>
                <lightning-formatted-text 
                    value={errorMessage}
                    class="slds-text-color_error">
                </lightning-formatted-text>
            </template>

            <template if:true={isLoading}>
                <div class="slds-m-left_small">
                    <lightning-spinner alternative-text="Cloning..." size="medium"></lightning-spinner>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
