<template>
    <lightning-record-edit-form object-api-name={objectApiName} record-type-id={recordTypeId} onload={handleLoad}
        onsubmit={handleSubmit}>
        <div class="slds-text-heading_medium slds-p-vertical_large">{currentStage}</div>
        <div class="slds-box">
            <template if:true={showSpinner}>
                <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
            </template>
            <div class="slds-grid slds-gutters slds-p-bottom_x-large">
                <div class="slds-col slds-size_1-of-12"></div>
                <div class="slds-col slds-size_10-of-12">
                    <c-nac-stage-indicator stages={stages} current-stage={currentStage}></c-nac-stage-indicator>
                </div>
                <div class="slds-col slds-size_1-of-12"></div>
            </div>
            <template if:true={step1}>
                <div class="slds-text-heading_small slds-p-bottom_small">Please Select the Record
                    type</div>
                <lightning-radio-group label="Please Select the Record type" options={recordTypeOptions} type="radio"
                    variant="label-hidden" onchange={handleRecordTypeSelect} class="slds-p-bottom_small" required>
                </lightning-radio-group>
            </template>
            <template if:true={step2}>
                <template if:true={isCoreReturn}>
                    <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
                        <template for:each={sectionList} for:item="section">
                            <lightning-accordion-section key={section.sectionAPIName} name={section.sectionAPIName}
                                label={section.sectionLabel}>
                                <div class="slds-grid slds-gutters slds-wrap slds-p-left_large">
                                    <template for:each={section.fieldList} for:item="field">
                                        <div class="slds-col slds-size_1-of-2" key={field.apiName}>
                                            <lightning-input-field field-name={field.apiName}
                                                data-fieldname={field.apiName} required={field.isRequired}
                                                disabled={field.isReadOnly} onchange={handleCaseFieldChange}
                                                value={field.value}>
                                            </lightning-input-field>
                                        </div>
                                    </template>
                                </div>
                            </lightning-accordion-section>
                        </template>
                    </lightning-accordion>
                </template>
                <template if:true={isPerformancePart}>
                    <lightning-accordion allow-multiple-sections-open active-section-name={ppActiveSections}>
                        <template for:each={ppSectionList} for:item="section">
                            <lightning-accordion-section key={section.sectionAPIName} name={section.sectionAPIName}
                                label={section.sectionLabel}>
                                <div class="slds-grid slds-gutters slds-wrap slds-p-left_large">
                                    <template for:each={section.fieldList} for:item="field">
                                        <div class="slds-col slds-size_1-of-2" key={field.apiName}>
                                            <lightning-input-field field-name={field.apiName}
                                                data-fieldname={field.apiName} required={field.isRequired}
                                                disabled={field.isReadOnly} onchange={pphandleCaseFieldChange}
                                                value={field.value}>
                                            </lightning-input-field>
                                        </div>
                                    </template>
                                </div>
                            </lightning-accordion-section>
                        </template>
                    </lightning-accordion>
                </template>
            </template>
            <template if:true={step3}>
                <template if:false={isAddressChange}>
                    <div class="slds-grid slds-gutters slds-p-bottom_x-large">
                        <div class="slds-col slds-size_1-of-1">
                            <div class="slds-float_right">
                                <!-- For Core Return Step 3-->
                                <template if:true={isCoreReturn}>
                                    <lightning-button label="Clear Selected" onclick={handleClearSelected}
                                        disabled={disableClearSelectedButton} class="slds-m-left_x-small">
                                    </lightning-button>
                                    <lightning-button variant="brand" label={addMoreItemLabel}
                                        onclick={handleAddMoreItems} class="slds-m-left_x-small">
                                    </lightning-button>
                                </template>
                                <!-- For Performance Part Step 3-->
                                <template if:true={isPerformancePart}>
                                    <lightning-button label="Clear Selected"
                                        onclick={handleClearSelectedPerformancePart}
                                        disabled={perfPartdisableClearSelectedButton} class="slds-m-left_x-small">
                                    </lightning-button>
                                    <lightning-button variant="brand" label={perfPartaddMoreItemLabel}
                                        onclick={pphandleAddMoreItems} class="slds-m-left_x-small">
                                    </lightning-button>
                                </template>
                            </div>
                            <template if:true={isPerformancePart}>
                                <div class="slds-text-body_small">Note : Please enter N/A if NOT VALID for selected case
                                    reason.</div>
                            </template>
                        </div>
                    </div>
                    <!-- For Core Return Step 3-->
                    <template if:true={isCoreReturn}>
                        <lightning-layout class="header-row cell-container">
                            <template for:each={columnHeader} for:item="col">
                                <lightning-layout-item class={col.class} key={col.label}>
                                    <template if:true={col.showCheckbox}>
                                        <lightning-input type="checkbox" label="" variant="label-hidden"
                                            value={headerCheckBox} class="slds-p-right_medium slds-float_left"
                                            data-id="headerCheckBox" onchange={handleCheckAll}>
                                        </lightning-input>
                                    </template>
                                    <div class="slds-grid slds-grid_vertical-align-center cell-with-cursor">
                                        <span class="col-header-text" title={col.label}>{col.label}</span>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </lightning-layout>
                        <template for:each={coreReturnProductList} for:item="prod" for:index="index">
                            <lightning-layout key={prod.index} class="onhover data-row cell-container">
                                <template for:each={prod.value} for:item="field">
                                    <lightning-layout-item class={field.class} key={field.label}>
                                        <template if:false={field.isEditable}>
                                            <template if:false={field.isdelete}>
                                                <template if:true={field.showCheckbox}>
                                                    <lightning-input type="checkbox" label="" variant="label-hidden"
                                                        value={prod.checkbox}
                                                        class="slds-p-right_medium slds-float_left" data-id={prod.Id} data-index={index}
                                                        onchange={handleCheck}>
                                                    </lightning-input>
                                                </template>
                                                <!-- CXREF-3477 -->
                                                <div
                                                    class="slds-grid slds-grid_vertical-align-center cell-with-cursor wrapped-content">
                                                    <span class="data-cell" title={field.value}>{field.value}</span>
                                                </div>
                                                <!-- CXREF-3477 -->
                                            </template>
                                            <template if:true={field.isdelete}>
                                                <lightning-icon icon-name="utility:delete" size="small" variant="error"
                                                    class="iconClass" data-id={prod.Id} data-index={index}
                                                    onclick={deleteRow}></lightning-icon>
                                            </template>
                                        </template>
                                        <template if:true={field.isEditable}>
                                            <template if:true={field.isCombobox}>
                                                <lightning-combobox name="warrantySelect" value={field.value}
                                                    options={warrantyOptions.data.values}
                                                    onchange={handleIsWarrantyChange} variant='label-hidden' data-index={index}
                                                    data-id={prod.Id}></lightning-combobox>
                                            </template>
                                            <template if:false={field.isCombobox}>
                                                <input class="slds-input inputclass data-cell" type={field.type}
                                                    value={field.value} data-id={prod.Id} data-fieldname={field.label} data-index={index}
                                                    onchange={handleFieldChange} min="1" step="1"
                                                    maxlength={field.maxlength} />
                                            </template>

                                        </template>
                                    </lightning-layout-item>
                                </template>
                            </lightning-layout>
                        </template>
                    </template>
                    <!-- For Performance Part Return Step 3-->
                    <template if:true={isPerformancePart}>
                        <lightning-layout class="header-row cell-container">
                            <template for:each={columnHeaderPerformance} for:item="col">
                                <lightning-layout-item class={col.class} key={col.label}>
                                    <template if:true={col.showCheckbox}>
                                        <lightning-input type="checkbox" label="" variant="label-hidden"
                                            value={perfPartheaderCheckBox} class="slds-p-right_medium slds-float_left"
                                            data-id="ppheaderCheckBox" onchange={perfPartHandleCheckAll}>
                                        </lightning-input>
                                    </template>
                                    <div class="slds-grid slds-grid_vertical-align-center cell-with-cursor">
                                        <span class="col-header-text" title={col.label}>{col.label}</span>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </lightning-layout>
                        <template for:each={perfPartReturnProductList} for:item="prod">
                            <lightning-layout key={prod.Id} class="onhover data-row cell-container">
                                <template for:each={prod.value} for:item="field">
                                    <lightning-layout-item class={field.class} key={field.label}>
                                        <template if:true={field.isEditable}>
                                            <template if:false={field.isdelete}>
                                                <template if:true={field.showCheckbox}>
                                                    <lightning-input type="checkbox" label="" variant="label-hidden"
                                                        value={prod.checkbox}
                                                        class="slds-p-right_xx-small slds-float_left" data-id={prod.Id}
                                                        onchange={pphandleCheck}>
                                                    </lightning-input>
                                                    <input class="slds-input inputclass data-cell " type={field.type}
                                                        value={field.value} data-id={prod.Id}
                                                        data-fieldname={field.label} onchange={pphandleFieldChange}
                                                        min="1" step="1" maxlength={field.maxlength} />
                                                </template>
                                                <template if:false={field.showCheckbox}>
                                                    <template if:false={field.isCombobox}>
                                                        <input class="slds-input inputclass data-cell "
                                                            type={field.type} value={field.value} data-id={prod.Id}
                                                            data-fieldname={field.label} onchange={pphandleFieldChange}
                                                            min="1" step="1" maxlength={field.maxlength} />
                                                    </template>
                                                </template>
                                            </template>
                                        </template>
                                        <template if:false={field.isEditable}>
                                            <template if:true={field.isdelete}>
                                                <template if:true={field.isdelete}>
                                                    <lightning-icon icon-name="utility:delete" size="small"
                                                        variant="error" class="iconClass" data-id={prod.Id}
                                                        onclick={ppdeleteRow}></lightning-icon>
                                                </template>
                                            </template>
                                        </template>
                                    </lightning-layout-item>
                                </template>
                            </lightning-layout>
                        </template>
                    </template>
                </template>

                                                            transform="translate(64.000000, 64.000000) rotate(150.000000) translate(-64.000000, -64.000000) "
                                                            cx="64" cy="64" r="33"></circle>
                                                    </g>
                                                    <g transform="translate(41.000000, 41.000000)"
                                                        class="slds-illustration__stroke-primary" stroke-width="3">
                                                        <circle vector-effect="non-scaling-stroke" cx="23" cy="23"
                                                            r="23"></circle>
                                                    </g>
                                                </g>
                                            </g>
                                        </g>
                                    </g>
                                </svg>
                                <div class="slds-text-longform">
                                    <h3 class="slds-text-heading_medium">
                                        <template if:true={updateShippingAddress}>
                                            Looks like you do not have any approved Shipping Address
                                        </template>
                                        <template if:true={updateBillingAddress}>
                                            Looks like you do not have any approved Billing Address
                                        </template>
                                    </h3>
                                </div>
                            </div>
                        </template>
                        <template if:false={noAddressOption}>
                            <table class="slds-table slds-table_cell-buffer slds-no-row-hover slds-table_striped">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th class="" scope="col">
                                            <template if:true={updateShippingAddress}>
                                                <div class="slds-truncate" title="Shipping Address">Shipping Address
                                                </div>
                                            </template>
                                            <template if:true={updateBillingAddress}>
                                                <div class="slds-truncate" title="Billing Address">Billing Address</div>
                                            </template>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={addressOptions} for:item="addressOption">
                                        <tr key={addressOption.value}>
                                            <td>
                                                <input type="radio" class="slds-m-horizontal_x-small"
                                                    value={addressOption.value} id={addressOption.value} checked={addressOption.selected}
                                                    onclick={handleAddressSelect}>
                                                <label class="slds-truncate" title={addressOption.label}
                                                    for={addressOption.value}>{addressOption.label}</label>
                                                <template if:true={addressOption.selected}>
                                                    <div class="slds-box slds-box_small slds-m-around_x-small">
                                                        <lightning-input-field field-name="NAOCAP_Street__c"
                                                            data-fieldname="NAOCAP_Street__c" required
                                                            onchange={handleCaseAddressFieldChange}
                                                            value={address.street} variant="label-stacked">
                                                        </lightning-input-field>
                                                        <div class="slds-grid slds-wrap">
                                                            <div class="slds-size_1-of-2">
                                                                <lightning-input-field field-name="NAOCAP_City__c"
                                                                    data-fieldname="NAOCAP_City__c" required
                                                                    onchange={handleCaseAddressFieldChange}
                                                                    value={address.city} variant="label-stacked">
                                                                </lightning-input-field>
                                                            </div>
                                                            <div class="slds-size_1-of-2 slds-p-left_large">
                                                                <lightning-input-field field-name="NAOCAP_Zip_Code__c"
                                                                    data-fieldname="NAOCAP_Zip_Code__c" required
                                                                    onchange={handleCaseAddressFieldChange}
                                                                    value={address.zipCode} variant="label-stacked">
                                                                </lightning-input-field>
                                                            </div>
                                                        </div>
                                                        <lightning-input-field field-name="NAOCAP_State__c"
                                                            data-fieldname="NAOCAP_State__c" required
                                                            onchange={handleCaseAddressFieldChange}
                                                            value={address.state} variant="label-stacked">
                                                        </lightning-input-field>
                                                        <lightning-input-field field-name="NAOCAP_Country__c"
                                                            data-fieldname="NAOCAP_Country__c" required
                                                            onchange={handleCaseAddressFieldChange}
                                                            value={address.country} variant="label-stacked">
                                                        </lightning-input-field>
                                                    </div>
                                                </template>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </template>
                    </template>
                </template>
            </template>
        </div>
        <div class="slds-p-bottom_large"></div>
        <template if:true={showBackButton}>
            <div class="slds-float_left">
                <lightning-button label="Back" onclick={handleClickBack} class="slds-m-left_x-small"></lightning-button>
            </div>
        </template>
        <div class="slds-float_right">
            <lightning-button label="Cancel" onclick={handleClickCancel} class="slds-m-left_x-small"></lightning-button>
            <template if:true={showRecordEditFormButton}>
                <lightning-button variant="brand" label={nextButtonLabel} type="submit" class="slds-m-left_x-small">
                </lightning-button>
            </template>
            <template if:false={showRecordEditFormButton}>
                <lightning-button variant="brand" label={nextButtonLabel} onclick={handleClickNext}
                    disabled={disableNextButton} class="slds-m-left_x-small">
                </lightning-button>
            </template>
        </div>
    </lightning-record-edit-form>
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <header class="slds-modal__header border-0 slds-theme_default">
                    <p class="slds-text-heading_medium slds-hyphenate">
                        Search Core Item</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-nac_-lookup-component label="Please Search Core item" additional-condition={additionalCondition}
                        icon-name="standard:return_order_line_item" s-object-api-name="Product2"
                        corelocation={coreLocation} onlookupupdate={handleLookupSelect}></c-nac_-lookup-component>
                    <div class="slds-p-bottom_xx-large"></div>
                    <div class="slds-p-bottom_xx-large"></div>
                    <div class="slds-p-bottom_xx-large"></div>
                    <div class="slds-p-bottom_xx-large"></div>
                    <div class="slds-p-bottom_xx-large"></div>
                    <div class="slds-p-bottom_small"></div>
                    <div class="slds-grid slds-gutters slds-align_absolute-center">
                        <lightning-button label={label.cancelLabel} title={label.cancelLabel} onclick={handleCancel}
                            class="slds-m-left_x-small"></lightning-button>
                        <lightning-button variant="brand" label={label.okLabel} title={label.okLabel}
                            disabled={disableSelectbutton} onclick={handleSelectCoreItem} class="slds-m-left_x-small">
                        </lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
