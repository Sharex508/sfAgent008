<template>
    <template if:true={dataAvailable}>
        <template if:true={isShowModal}>
            <c-nac_ware-house-modal boolitem={boolitem} oncalltoclose={handlecloseModal}
                oncallbackaction={handleSelectedWarehouse}
                ontherefreshpage={handlePageRefresh} effective-account-id={effectiveAccountId}></c-nac_ware-house-modal>
        </template>
        <template if:true={showBreadcrumbs}>
            <lightning-breadcrumbs class="slds-p-vertical_medium slds-p-left_large">
                <template for:each={_resolvedCategoryPath} for:item="level">
                    <lightning-breadcrumb key={level.name} label={level.name} href={level.url}>
                    </lightning-breadcrumb>
                </template>
            </lightning-breadcrumbs>
        </template>
        <article class="slds-border_top slds-p-top_large layout-contiainer">
            <lightning-spinner if:true={isLoading} class="slds-is-absolute slds-align_absolute-center"
                alternative-text="Loading products..." size="medium" variant="brand">
            </lightning-spinner>
            <template if:true={showLeftPannel}>
                <aside class="aside-section">
                    <template if:true={showCategory}>
                        <c-nac_vertical-category></c-nac_vertical-category>
                        <div class="slds-p-bottom_medium"></div>
                    </template>
                    <div class="slds-p-bottom_medium filters-header">
                        <p class="slds-truncate slds-text-heading_medium">{label.filterProducts}</p>
                        <lightning-button class="clear-all-button slds-text-heading_small" variant="base"
                            label="Clear All" onclick={handleClearAll}>
                        </lightning-button>
                    </div>
                    <template if:true={showSearchCategory}>
                        <c-search-category class="slds-border_top slds-p-bottom_small"
                            display-data={displayData.categoriesData} oncategoryupdate={handleCategoryUpdate}>
                        </c-search-category>
                    </template>
                    <template if:true={showFilter}>
                        <div if:true={dataAvailableForSearchPage}>
                            <c-search-filter display-data={displayData.facetsData} class="slds-p-bottom_medium"
                                onfacetvalueupdate={handleFacetValueUpdate}>
                            </c-search-filter>
                        </div>
                    </template>
                </aside>
            </template>
            <div if:false={dataAvailableForSearchPage} class="slds-text-heading_large slds-p-around_large">
                {label.noResultsMsg}</div>
            <section if:true={dataAvailableForSearchPage} class="main-section">
                <div class="slds-grid slds-gutters slds-p-left_medium">
                    <div class="slds-truncate slds-text-heading_small slds-col slds-size_8-of-12">{headerText}</div>
                    <template if:true={showSortOption}>
                        <template if:true={showSort}>
                            <div class="slds-col slds-size_4-of-12">
                                <div class="slds-p-left_xxx-small slds-p-bottom_xx-small">Sort By</div>
                                <lightning-combobox value={sortValue} options={sortOptions} variant="label-hidden"
                                    onchange={handleSortChange} dropdown-alignment="auto"></lightning-combobox>
                            </div>
                        </template>
                    </template>
                </div>
                <c-search-layout display-data={displayData.layoutData} config={config.layoutConfig}
                    selected-warehouse={selectedWarehouse} button-label={buttonLabel} oncalltoaction={handleAction}
                    onshowdetail={handleShowDetail}>
                </c-search-layout>
                <c-search-paginator if:true={hasMorePages} page-number={pageNumber} page-size={displayData.pageSize}
                    total-item-count={displayData.total} onprevious={handlePreviousPage} onnext={handleNextPage}>
                </c-search-paginator>
            </section>
        </article>
    </template>
    <template if:false={dataAvailable}>
        <div class="slds-text-heading_small">{label.noOrderMsg}</div>
    </template>
</template>
