<template>
    <ul>
        <template for:each={displayItems} for:item="lineItem">
            <li key={lineItem.cartItem.cartItemId}  class={lineItem.liStyling}>
                <figure>
                    <a tabindex="-1" href={lineItem.productUrl}
                        data-productid={lineItem.cartItem.productDetails.productId}
                        onclick={handleProductDetailNavigation}>
                        <img src={lineItem.productImageUrl} alt={lineItem.productImageAlternativeText}
                            data-productid={lineItem.cartItem.productDetails.productId} />
                    </a>
                </figure>
                
                <div class="details slds-has-flexi-truncate">
                    <div class="item-name slds-text-heading_small slds-p-bottom_small slds-truncate"
                        title={lineItem.cartItem.productDetails.fields.ProductCode}>
                        <a href={lineItem.productUrl} data-productid={lineItem.cartItem.productDetails.productId}
                            onclick={handleProductDetailNavigation} tabindex="0">
                            <lightning-formatted-rich-text value={lineItem.cartItem.productDetails.fields.ProductCode}></lightning-formatted-rich-text>
                            
                        </a>
                        <span class="slds-m-bottom_small"> 
                        <template if:false={lineItem.isDDANDPG123}>                             
                            <template if:true={lineItem.directdelivery}>
                                <lightning-helptext class="slds-m-bottom_small" content="Direct Delivery product from our supplier – you may not see inventory on hand.">
                                </lightning-helptext>
                            </template>
                            <template if:true={lineItem.isPriceGroup123}>
                                <lightning-helptext class="slds-m-bottom_small" content="Can only be shipped to a location within the US.">
                                </lightning-helptext>
                            </template>
                        </template>
                        <template if:true={lineItem.isDDANDPG123}>                            
                                <lightning-helptext class="slds-m-bottom_small" content={lineItem.isDDANDPG123Content}>
                                </lightning-helptext>
                        </template>
                        </span>
                    </div>
                    <div class="line-item-properties">
                        <dl class="product-fields" style="width:25%">
                            <dt class="slds-text-title"><lightning-formatted-rich-text value={lineItem.cartItem.productDetails.name}></lightning-formatted-rich-text>
                                <br/>{lineItem.availableCount}
                            </dt>
                        </dl>
                        <div class="quantity-price-remove">
                            <div
                                class="quantity-selector slds-grid slds-grid_vertical-align-center slds-text-title_caps slds-p-right_large">
                                <label for={lineItem.cartItem.cartItemId}
                                    class="selector-label slds-m-right_x-small">{labels.quantity}
                                </label>
                                <input class="selector-input slds-p-horizontal_medium slds-p-vertical_x-small"
                                    disabled={lineItem.greyOut} id={lineItem.cartItem.cartItemId}
                                    data-item-id={lineItem.cartItem.cartItemId} max="100000" min="1" required
                                    type="number" value={lineItem.cartItem.quantity} onblur={handleQuantitySelectorBlur}
                                    onclick={handleQuantitySelectorClick} />
                            </div>
                            <div class="slds-p-horizontal_medium slds-has-flexi-truncate">
                                <dl class="product-fields">
                                    <dt style="text-align:right">{labelstr.listPriceLabel}</dt>
                                    <dd>
                                        <lightning-formatted-number aria-label={lineItem.originalPriceLabel}
                                            format-style="currency" currency-code={currencyCode}
                                            class="negotiated-price slds-text-heading_small"
                                            currency-display-as="symbol" maximum-fraction-digits="2"
                                            value={lineItem.cartItem.listPrice}>
                                        </lightning-formatted-number>
                                    </dd>
                                    <dt style="text-align:right">{labelstr.netPriceLabel}</dt>
                                        <dd>
                                            <lightning-formatted-number format-style="currency" currency-code={currencyCode}
                                            class="negotiated-price slds-text-heading_small"
                                            currency-display-as="symbol" maximum-fraction-digits="2"
                                            value={lineItem.cartItem.unitAdjustedPrice}>
                                            </lightning-formatted-number>  
                                        </dd>
                                    <dt style="text-align:right">{labelstr.totalPriceLabel}</dt>
                                    <dd>
                                        <lightning-formatted-number format-style="currency" currency-code={currencyCode}
                                            class="negotiated-price slds-text-heading_small"
                                            currency-display-as="symbol" maximum-fraction-digits="2"
                                            value={lineItem.cartItem.totalPrice}>
                                        </lightning-formatted-number>
                                    </dd>
                                </dl>
                            </div>
                            <div class="slds-p-around_small remove">
                                <lightning-button variant="destructive" label="Delete" alternative-text="remove" data-cartitemid={lineItem.cartItem.cartItemId} data-qtity={lineItem.cartItem.quantity} disabled={lineItem.greyOut}
                                    onclick={handleDeleteCartItem}>
                                </lightning-button>
                            </div>
                            <!--c-nac_-delete-modal  clicked-id={clickedId} show-modal={showModal} data-cartitemid={lineItem.cartItem.cartItemId}  disabled={isCartDisabled}></c-nac_-delete-modal-->
                                     
                        </div>
                    </div>
                </div>
            </li>
         <!--/template-->
        </template>
    </ul>
    <!-- Gavish > Why do we have multiple copies of the same modal? 
    Code formatting also needs to be fixed
    Strings here are not coming from custom label-->
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <!-- modal header start -->
                <header class="slds-modal__header border-0 slds-theme_default">
                    <p class="slds-text-heading_medium slds-hyphenate">Please Confirm</p>
                </header>
                <!-- modal body start -->
                <div class="slds-modal__content slds-p-around_medium">
                </br>
                </br>
                    <center><p>Are you sure you want to delete this item?</p></center>
                </br>
                                <div class="slds-grid slds-gutters slds-align_absolute-center">
                                    <button class="slds-button slds-button_neutral" onclick={hideModalBoxxx}>Cancel</button>
                                    <button class="slds-button slds-button_neutral" onclick={handleDelete}>Ok</button>
                                </div>
                </br>
                </br>
                </div>
                <!-- modal footer start-->
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
    <template if:true={showAddmore}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <!-- modal header start -->
                <header class="slds-modal__header border-0 slds-theme_default">
                    <p class="slds-text-heading_medium slds-hyphenate">Please Confirm</p>
                </header>
                <!-- modal body start -->
                <div class="slds-modal__content slds-p-around_medium">
                </br>
                </br>
                    <center><p>Are you sure you want to change the quantity?</p></center>
                </br>
                                <div class="slds-grid slds-gutters slds-align_absolute-center">
                                    <button class="slds-button slds-button_neutral" onclick={hideModalBox}>Cancel</button>
                                    <button class="slds-button slds-button_neutral" onclick={handleAddMore}>Ok</button>
                                </div>
                </br>
                </br>
                </div>
                <!-- modal footer start-->
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <!--div if:true={showLoadingSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </div-->
</template>
