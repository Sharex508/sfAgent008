<template>
    <!-- Cart Header-->
    <div class="slds-col slds-text-align_right">
        <template if:true={showWarehouseDetails}>
            <lightning-icon icon-name="utility:checkin" title="checkin"></lightning-icon>
            <lightning-formatted-text value={ClickedWarehouse}></lightning-formatted-text>
            <lightning-button variant="brand" label="Change Warehouse" title="Change your selected warehouse"
                onclick={handleChangeWarehouse} class="slds-m-left_x-small"></lightning-button>
        </template>
    </div>
    <header class="slds-p-around_large">

        <div class="slds-text-heading_large">{cartHeader}</div>
        <lightning-combobox if:false={isCartEmpty} class="sort-menu" label={labels.sortBy} value={sortParam}
            options={sortOptions} onchange={handleChangeSortSelection}>
        </lightning-combobox>
    </header>

    <template if:true={openWarehouseModal}>
        <c-nac_ware-house-modal open-warehouse-modal={openWarehouseModal} oncalltoclose={closeModal}
            ontherefreshpage={therefreshPage} effective-account-id={resolvedEffectiveAccountId}></c-nac_ware-house-modal>
    </template>
    <!-- Active Cart with Cart Items -->
    <template if:false={isCartClosed}>
        <div class="slds-p-left_large slds-p-right_large">
            <c-cart-items cart-items={cartItems} currency-code={currencyCode} onquantitychanged={handleQuantityChanged}
                onsinglecartitemdelete={handleCartItemDelete} is-cart-disabled={isCartDisabled}
                availability-map={availabilityMap} warehouse-selected={ClickedWarehouse}>
            </c-cart-items>
            <lightning-spinner if:true={isCartItemListIndeterminate} alternative-text={labels.loadingCartItems}
                class="slds-is-relative slds-align_absolute-center slds-m-around_large" variant="brand">
            </lightning-spinner>
            <template if:false={isCartItemListIndeterminate}>
                <template if:true={showSpinner}>
                    <lightning-spinner alternative-text={labels.loadingCartItems} class="slds-align--absolute-center"
                        size="large" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-grid slds-gutters slds-border_top slds-m-top_small">
                    <div class="slds-col slds-size_1-of-3 slds-p-around_large">
                        <template if:true={showPageSize}>
                            <ul class="slds-list_horizontal slds-has-inline-block-links_space">
                                <li>
                                    <h4 class="slds-p-right_small">Results Showing</h4>
                                </li>
                                <template for:each={pageSizeOptions} for:item="option">
                                    <li key={option.value}>
                                        <template if:true={option.selected}>
                                            <h4 class="slds-p-right_small">{option.value}</h4>
                                        </template>
                                        <template if:false={option.selected}>
                                            <span class="slds-p-right_small pointer" data-value={option.value}
                                                onclick={handleChangePageSize}>{option.value}
                                            </span>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </template>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-float_right">
                        <c-search-paginator if:true={hasMorePages} page-number={pageNumber} page-size={pageSize}
                            total-item-count={_cartItemCount} onprevious={handlePreviousPage} onnext={handleNextPage}>
                        </c-search-paginator>
                    </div>
                </div>
            </template>
            <div if:true={isCartEmpty} class="slds-text-align_center slds-text-color_weak slds-p-top_xx-large">
                <h3 class="slds-text-heading_medium">
                    {labels.emptyCartHeaderLabel}
                </h3>
                <p class="slds-text-body_regular slds-p-top_small">
                    {labels.emptyCartBodyLabel}
                </p>
            </div>
            <!--Including the cart summary component here -->
            <c-cart-summary record-id={recordId} effective-account-id={effectiveAccountId}></c-cart-summary>
            <footer class="slds-p-around_small">
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_2-of-3 slds-float_left">
                        <button class="slds-button slds-button_neutral slds-button_stretch slds-size_4-of-12"
                            onclick={navigateAllProducts} style="height:40px">CONTINUE SHOPPING</button>
                        <button if:false={isCartEmpty}
                            class="slds-button slds-button_destructive slds-button_stretch slds-size_4-of-12"
                            onclick={handleClearCartAll} style="height:40px">DELETE ALL</button>
                    </div>
                    <div>
                    </div>

                    <div class="slds-col slds-size_1-of-3 slds-float_right">
                        <button if:false={isCartEmpty}
                            class="slds-button slds-button_brand slds-button_stretch slds-size_10-of-12"
                            onclick={navigateCheckout} style="height:40px">{labels.CheckoutLabel}</button>
                    </div>
                </div>
            </footer>
        </div>
    </template>

    <!-- Closed/Deleted Cart -->
    <template if:true={isCartClosed}>
        <div class="slds-text-align_center slds-text-color_weak slds-p-top_xx-large">
            <h3 class="slds-text-heading_medium">{labels.closedCartLabel}</h3>
        </div>
    </template>
    <template if:true={showAllDelModal}>
        <!-- Gavish > Commented code -->
        <!--c-nac_-delete-modal oncalltoactiondel={handleClearCartButtonClicked}></c-nac_-delete-modal-->
        <!--template if:true={showAllDelModal}-->
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <!-- modal header start -->
                <header class="slds-modal__header border-0 slds-theme_default">
                    <p class="slds-text-heading_medium slds-hyphenate slds-align_absolute-center">
                        {labels.pleaseConfirmLabel}</p>
                </header>
                <!-- modal body start -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    </br>
                    </br>
                    <!-- Gavish > Fix Code formatting -->
                    <center>
                        <p>{labels.clearCartLabel}</p>
                    </center>
                    </br>
                    <div class="slds-grid slds-gutters slds-align_absolute-center">
                        <button class="slds-button slds-button_neutral"
                            onclick={hideModalBox}>{labels.cancelLabel}</button>
                        <button class="slds-button slds-button_neutral"
                            onclick={handleClearCartButtonClicked}>{labels.okLabel}</button>

                    </div>

                    </br>
                    </br>
                </div>

                <!-- modal footer start-->


            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <!--/template-->
    </template>
    <div if:true={showLoadingSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>

    </div>
    <template if:true={openCartValidateModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <header class="slds-modal__header border-0 slds-theme_default">
                    <p class="slds-text-heading_medium slds-hyphenate">
                        Confirm Cart Item(s) Update</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    These items are not orderable for {ClickedWarehouseName} warehouse:
                    </br>
                    <table class="slds-table ">
                        <thead>
                            <tr class="slds-text-title_caps">
                                <th scope="col">
                                    <div title="Key">Product Code</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={validateMapData} for:item="map">
                                <tr key={map.key}>
                                    <th scope="col">
                                        <div title={map.value}>{map.value}</div>
                                    </th>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <div class="slds-p-bottom_xx-large"></div>

                    <div class="slds-grid slds-gutters slds-align_absolute-center">
                        <lightning-button variant="brand" label='Ok' title='Ok' onclick={removeInvalidCartItems}
                            class="slds-m-left_x-small">
                        </lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
