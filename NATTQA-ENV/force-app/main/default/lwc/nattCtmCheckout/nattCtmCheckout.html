<template>
  <template if:false={isCreateDropShip}>
    <template if:true={cartSummary}>
      <template if:false={showSummary}>
        <div class="slds-grid slds-wrap">
          <div class="slds-col slds-size_2-of-3 slds-border_bottom">
            <div class="slds-grid slds-wrap">
              <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                <lightning-input type="text" name="cName" value={cartObject.NATT_Order_Contact__c} label={label.ContactNameLabel}
                  onchange={handleChange}></lightning-input>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                <lightning-input type="tel" name="cPhone" value={cartObject.NATT_Order_Contact_Phone__c}
                  label={label.TelephoneLabel} onchange={handleChange}></lightning-input>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                <lightning-input class="validate" type="email" name="cEmail"
                  value={cartObject.NATT_Order_Contact_Email__c} label={label.EmailAddressLabel} onchange={handleChange}
                  pattern="[A-Za-z0-9._-]+@[A-Za-z0-9-]+\.[A-Za-z.]{2,}$"
                  message-when-pattern-mismatch={label.PleaseEnteraValidEmailLabel}></lightning-input>
              </div>
            </div>
            <br/>
          </div>

          <div class="slds-col slds-size_2-of-3">
              <br/>
              <div class="slds-grid slds-wrap">
                  
                  <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                      <lightning-input type="text" name="cPoNumber" value={cartObject.PoNumber} label={label.POLabel}
                          onchange={handleChange} required>
                      </lightning-input>
                  </div>
                  <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                    <lightning-input 
                        type="text" 
                        name="Warehouse" 
                        value={warehouseSelected} 
                        label="Warehouse"
                        readonly>
                    </lightning-input>
                </div>
                
                  <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                    <!--New Field logic Added-->
                    
                       <lightning-input type="text" name="cCliente/Proyecto" value={cartObject.Client_Final_Project__c} label={label.ProyectoFinal}
                          onchange={handleChange} minlength="0" maxlength="20" required>
                      </lightning-input>
                    
                      <!-- <lightning-input type="text" name="freightAccountNumber" value={cartObject.NATT_Freight_Account_Number__c}
                          label={label.FreightAccountNumberLabel} required onchange={handleChange}>
                      </lightning-input> -->
                  </div>
              </div>
          </div>
          <div class="slds-col slds-size_2-of-3">
              <div class="slds-grid slds-wrap">
                  <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                      <lightning-combobox
                          name="incoterm"
                          label="Incoterm"
                          value={incotermValue}
                          options={incotermOptions}
                          onchange={handleChange} >
                      </lightning-combobox>
                  </div>
                  <template if:true={showShippingMethod}>
                    <div class="slds-col slds-size_1-of-2 slds-p-right_xx-small">
                      <lightning-combobox
                          name="shippingMethod"
                          label={label.ShippingMethodNameLabel}
                          value={shippingMethodValue}
                          options={shippingMethodOptions}
                          onchange={handleShippingMethodChange} >
                      </lightning-combobox>
                    </div>
                  </template>
              </div>
          </div>

              </div><br />

                </div><br />
              </template>
            </div>

        <article class="slds-card">
          <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
              <div class="slds-media__body">
                <h2 class="slds-card__header-title">
                  <span>{label.PartDetailLabel}</span>
                </h2>
              </div>

            </header>
          </div>
          <div class="slds-card__body slds-card__body_inner">

              <thead>
                <tr class="slds-line-height_reset">
                  <th class="tbody slds-size_1-of-8" scope="col">
                    <div class="slds-truncate slds-align_absolute-center" title={label.PartNumberLabel}>{label.PartNumberLabel}</div>
                  </th>
                  <th class="tbody slds-size_3-of-8" scope="col">

                  </th>
                  <th class="tbody slds-size_1-of-8" scope="col">
                    <div class="slds-truncate slds-align_absolute-center" title={label.ExtendedLabel}>{label.ExtendedLabel}</div>
                  </th>
                  <!-- <th class="tbody slds-size_1-of-8" scope="col">
                    <div class="slds-truncate slds-align_absolute-center" title={label.UOMLabel}>{label.UOMLabel}</div>
                  </th> -->
                </tr>
              </thead>
              <tbody>
                <template for:each={cartDetail.wc.CartItems} for:item="line">
                  <tr key={line.Id}>
                    <td>
                      <div class="slds-truncate slds-align_absolute-center">{line.Product2.NATT_P_N__c}</div>
                    </td>
                    <td class="slds-cell-wrap">
                      <div class="slds-truncate  slds-align_absolute-center">{line.Product2.Name}</div>
                    </td>
                    <td>
                      <div class="slds-truncate slds-align_absolute-center">{line.Quantity}</div>
                    </td>
                    <td>
                      <div class="slds-truncate slds-align_absolute-center">
                        <lightning-formatted-number value={line.UnitAdjustedPrice} format-style="currency"
                          currency-code="USD"></lightning-formatted-number>
                      </div>
                    </td>
                    <td>
                      <div class="slds-truncate slds-align_absolute-center">
                        <lightning-formatted-number value={line.TotalPriceAfterAllAdjustments} format-style="currency"
                          currency-code="USD"></lightning-formatted-number>
                      </div>
                    </td>
                    <td>
                      <!-- <div class="slds-truncate slds-align_absolute-center">{line.Product2.NATT_UOM_Conversion__c}
                        &nbsp; {line.Product2.QuantityUnitOfMeasure}</div> -->
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <div class="slds-grid slds-gutters">

                    </td>
                  </tr>
                </tbody>

          </div>
